name: "Setup & Run YDB"
description: "Sets up YDB test environment with monitoring. Collects and uploads metrics during cleanup."

inputs:
  # GitHub
  github_token:
    description: "GitHub token for API access."
    required: false
  github_issue:
    description: "Pull request number. Auto-detected if not provided."
    required: false

  # Workload: general
  workload_name:
    description: "Name of the workload (used for artifact naming)."
    required: true
  workload_duration:
    description: "Duration of the workload in seconds."
    required: false
    default: "60"

  # Workload: current
  workload_current_ref:
    description: "Git ref for current version (used as 'ref' label in metrics)."
    required: false
    default: "current"
  workload_current_image:
    description: "Docker image for current workload."
    required: true
  workload_current_command:
    description: "Command arguments for current workload."
    required: false
    default: ""

  # Workload: baseline
  workload_baseline_ref:
    description: "Git ref for baseline version (used as 'ref' label in metrics)."
    required: false
    default: "baseline"
  workload_baseline_image:
    description: "Docker image for baseline workload. If not provided, baseline comparison is skipped."
    required: false
  workload_baseline_command:
    description: "Command arguments for baseline workload."
    required: false
    default: ""

  # Metrics
  metrics_yaml:
    description: "Custom metrics configuration (inline YAML)."
    required: false
  metrics_yaml_path:
    description: "Path to custom metrics configuration file."
    required: false

  # Infrastructure
  disable_compose_profiles:
    description: "Comma-separated list of compose profiles to disable (e.g., 'chaos,telemetry')."
    required: false

outputs:
  ydb-prometheus-url:
    description: "Prometheus URL (if telemetry profile is enabled)."
  ydb-prometheus-otlp:
    description: "Prometheus OTLP receiver URL (if telemetry profile is enabled)."

runs:
  using: "node24"
  main: "../dist/init/main.js"
  post: "../dist/init/post.js"
